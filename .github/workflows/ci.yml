name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
      - "research/*"
  pull_request:
    branches:
      - main
      - frontend-dev
      - backend-dev
  

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          python-version: "3.10"
      

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start system with docker compose
        run: docker compose up --build -d

      - name: Wait for backend to start
        run: sleep 10

      - name: Check backend health
        run: curl --fail http://localhost:8000/health

      - name: Show logs if failure
        if: failure()
        run: docker compose logs
        
      