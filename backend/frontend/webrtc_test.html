<!DOCTYPE html>
<html>
<head>
  <title>WebRTC Voice Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; padding: 2rem; }
    h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 1rem; }
    button {
      padding: 0.5rem 1.4rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #eee;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { font-size: 0.85rem; padding: 4px 10px; border-radius: 6px; background: #2a2a2a; color: #888; }
    #status.connected { color: #4caf50; }
    #status.speaking { color: #ff9800; }
    #status.waiting { color: #ce93d8; }
    #status.error { color: #f44336; }
    .hint { font-size: 0.8rem; color: #555; margin-bottom: 1.5rem; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .panel { background: #242424; border: 1px solid #333; border-radius: 10px; padding: 1rem; min-height: 300px; display: flex; flex-direction: column; }
    .panel h2 { font-size: 0.85rem; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
    .panel-content { flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.6; }
    .transcript-entry { margin-bottom: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 6px; }
    .transcript-entry.user { background: #1e3a5f; color: #90caf9; }
    .transcript-entry.assistant { background: #1e3a2f; color: #a5d6a7; }
    .transcript-entry .label { font-size: 0.75rem; font-weight: 600; opacity: 0.7; margin-bottom: 2px; text-transform: uppercase; }
    .log-entry { font-family: monospace; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid #2a2a2a; }
    .log-entry .log-time { color: #555; margin-right: 8px; }
    .log-entry.type-session { color: #ce93d8; }
    .log-entry.type-audio { color: #80cbc4; }
    .log-entry.type-transcript { color: #a5d6a7; }
    .log-entry.type-response { color: #90caf9; }
    .log-entry.type-error { color: #ef9a9a; }
    .log-entry.type-other { color: #888; }
    @media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Feynman WebRTC Test</h1>
  <div class="controls">
    <button id="connectBtn">Connect</button>
    <span id="status">Not connected</span>
  </div>
  <p class="hint">Click Connect and just start talking — VAD will detect when you speak.</p>
  <div class="panels">
    <div class="panel">
      <h2>Transcript</h2>
      <div class="panel-content" id="transcript"></div>
    </div>
    <div class="panel">
      <h2>Events</h2>
      <div class="panel-content" id="eventLog"></div>
    </div>
  </div>

  <audio id="remoteAudio" autoplay></audio>

<script src="javascript/realtime.js"> </script>

</body>
</html>
